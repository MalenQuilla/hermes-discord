profile_name: brain
role: kanban-worker

model:
  provider: openrouter
  default: anthropic/claude-sonnet-4-6

skills:
  enabled:
    - obsidian
    - llm-wiki
    - note-taking
    - kanban-worker
  config:
    obsidian:
      api_url: ${OBSIDIAN_API_URL}
      api_key: ${OBSIDIAN_API_KEY}

allowed_toolsets:
  - mcp:obsidian-mcp
  - terminal
  - web

storage:
  memories_dir: /opt/data/runtime/profiles/brain/memories
  sessions_dir: /opt/data/runtime/profiles/brain/sessions
