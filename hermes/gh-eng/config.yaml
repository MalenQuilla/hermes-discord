profile_name: gh-eng
role: kanban-worker

model:
  provider: openrouter
  default: anthropic/claude-opus-4-7

skills:
  enabled:
    - github-issues
    - claude-code
    - test-driven-development
    - systematic-debugging
    - kanban-worker
  config:
    github-issues:
      repo: ${GITHUB_REPO}
      default_label: ${GITHUB_ISSUE_LABEL}

# Sandboxed terminal — code work isolated from host
terminal:
  backend: docker
  docker_image: nikolaik/python-nodejs:python3.11-nodejs20
  docker_mount_cwd_to_workspace: false
  docker_run_as_host_user: false
  docker_forward_env: [GITHUB_TOKEN, NPM_TOKEN]
  container_cpu: 2
  container_memory: 4096
  container_persistent: false

allowed_toolsets:
  - terminal
  - file
  - mcp:github
  - web

storage:
  memories_dir: /opt/data/runtime/profiles/gh-eng/memories
  sessions_dir: /opt/data/runtime/profiles/gh-eng/sessions
