profile_name: news
role: kanban-worker

model:
  provider: ${HERMES_PROVIDER}
  default: ${HERMES_NEWS_MODEL}

skills:
  enabled:
    - blogwatcher
    - xurl
    - youtube-content
    - kanban-worker
  config:
    blogwatcher:
      feeds:
        - https://news.ycombinator.com/rss
        - https://lobste.rs/rss
        - https://export.arxiv.org/rss/cs.AI
        - https://export.arxiv.org/rss/cs.LG
        - https://export.arxiv.org/rss/cs.SE
    xurl:
      accounts: []  # add handles via `hermes config set skills.config.xurl.accounts '[\"...\"]'`

terminal:
  backend: local
  cwd: /opt/data/runtime
  timeout: 120

allowed_toolsets:
  - terminal
  - web
  - mcp:obsidian-mcp

storage:
  memories_dir: /opt/data/runtime/profiles/news/memories
  sessions_dir: /opt/data/runtime/profiles/news/sessions
